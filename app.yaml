command: ["python", "scripts/start_app.py"]

resources:
  - name: lakebase-memory
    description: "Lakebase PostgreSQL for agent memory"
    database:
      database_resource_name: "telco-slm-agent-memory"

env:
  - name: CHAT_APP_PORT
    value: "3000"
  - name: API_PROXY
    value: "http://localhost:8000/invocations"
  - name: CHAT_PROXY_TIMEOUT_SECONDS
    value: "300"
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  - name: MLFLOW_EXPERIMENT_NAME
    value: "/Shared/otel-telco-agent-traces"
  - name: LAKEBASE_AUTOSCALING_PROJECT
    value: "telco-slm-agent-memory"
  - name: LAKEBASE_AUTOSCALING_BRANCH
    value: "production"
  - name: LAKEBASE_AGENT_MEMORY_SCHEMA
    value: "agent_memory"
  - name: LLM_ENDPOINT
    value: "databricks-claude-sonnet-4"
  - name: EMBEDDING_ENDPOINT
    value: "otel-embedding2-300m"
  - name: VS_ENDPOINT
    value: "demo_telco_vs_endpoint"
  # UC_CATALOG, UC_SCHEMA, DATABRICKS_WAREHOUSE_ID are NOT set here.
  # They are injected by databricks bundle deploy via apps.telco_agent.config.env
  # using ${var.catalog} / ${var.schema} so they stay workspace-agnostic.
  - name: TASK_TIMEOUT_SECONDS
    value: "300"
