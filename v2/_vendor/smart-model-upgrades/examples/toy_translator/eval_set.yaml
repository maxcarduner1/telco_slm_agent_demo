# Hard translation cases. Each row exercises something a literal word-for-word
# translation will fail on: idioms, register, formality levels, cultural
# adaptation, technical jargon, or context-dependent disambiguation.
# expected_answer encodes the must-haves AND must-NOTs so Correctness flags
# lazy outputs.

- text: "It's raining cats and dogs out there."
  target_language: "German"
  expected_answer: |
    Idiomatic German for heavy rain. Must use a German idiom such as 'Es regnet
    in Strömen' or 'Es schüttet wie aus Eimern'. Must NOT be a literal
    translation referencing cats or dogs ('Es regnet Katzen und Hunde' is wrong).

- text: "Break a leg tonight!"
  target_language: "French"
  expected_answer: |
    Idiomatic French wishing someone good luck before a performance.
    Acceptable: 'Merde !' or 'Bonne chance pour ce soir'. Must NOT be a literal
    translation about breaking a leg.

- text: "I'll cross that bridge when I come to it."
  target_language: "Spanish"
  expected_answer: |
    Idiomatic Spanish meaning 'I'll deal with that problem when it actually
    arises'. Acceptable: 'Cuando llegue el momento, lo resolveré' or similar.
    Must NOT be a literal translation about crossing a bridge.

- text: "Could His Excellency the Ambassador kindly indicate his preferred date for the reception?"
  target_language: "Japanese"
  expected_answer: |
    Highly formal Japanese (敬語) for addressing a head of mission. Must use
    sonkeigo verb forms and a formal title for ambassador (大使閣下). Must NOT
    be casual or plain-form Japanese.

- text: "yo what's good fam, you tryna grab some food rn?"
  target_language: "Spanish"
  expected_answer: |
    Casual / colloquial Latin American Spanish using slang for friend (e.g.
    'tío', 'wey', 'parce') and informal tu/vos. Must preserve the casual
    register. Must NOT use formal usted or dictionary-perfect Spanish.

- text: "The patient presents with acute myocardial infarction and atrial fibrillation."
  target_language: "French"
  expected_answer: |
    Medical French using the correct clinical terms 'infarctus du myocarde'
    and 'fibrillation auriculaire' (or atriale). Must read like a clinical
    note. Must NOT translate 'myocardial infarction' as 'crise cardiaque' (the
    lay term).

- text: "Subject to the foregoing, the indemnitor shall hold harmless the indemnitee from any third-party claims."
  target_language: "German"
  expected_answer: |
    Formal legal German. Must use 'schad- und klaglos halten' (or
    'Schadloshaltung') for 'hold harmless' and preserve the conditional clause
    structure. Must NOT be a casual paraphrase.

- text: "He saw the man with the telescope."
  target_language: "Italian"
  expected_answer: |
    Italian translation that preserves the structural ambiguity (who has the
    telescope) OR explicitly disambiguates. Must NOT silently lose the
    ambiguity by inserting information not in the source.

- text: "The early bird catches the worm — but the second mouse gets the cheese."
  target_language: "Portuguese"
  expected_answer: |
    Portuguese rendering that preserves both proverbs and their juxtaposition.
    First half should be the standard proverb 'Deus ajuda quem cedo madruga'
    or similar. The contrast between the two sayings must land.

- text: "Sorry, I can't make it — my dog ate my homework, again."
  target_language: "Mandarin"
  expected_answer: |
    Casual Mandarin preserving the sarcastic / tongue-in-cheek excuse register.
    Must convey that the speaker is offering a clichéd, transparently flimsy
    excuse. Must NOT translate as a sincere literal claim.

- text: "Per our previous correspondence dated 14 March, we regret to inform you that your application has not been successful on this occasion."
  target_language: "Korean"
  expected_answer: |
    Formal Korean business letter style (격식체). Must use the formal endings
    (-습니다 / -ㅂ니다) and standard rejection-letter phrasing. Must NOT use
    casual or banmal forms.

- text: "She really threw me under the bus in that meeting."
  target_language: "Dutch"
  expected_answer: |
    Idiomatic Dutch meaning that someone publicly betrayed or scapegoated the
    speaker. Acceptable: 'Ze heeft me echt voor de bus gegooid' or 'Ze liet me
    vallen als een baksteen'. Must NOT be a literal description of being
    physically pushed under a bus.

- text: "Oi, mate, fancy a cuppa?"
  target_language: "Russian"
  expected_answer: |
    Casual Russian invitation to share tea/coffee, preserving the friendly
    informal British register. Must use ты-forms (not вы), and idiomatic
    phrasing like 'Эй, пойдём чайку попьём?'. Must NOT be a stiff formal
    translation.

- text: "We need to circle back on the deliverables and align on a path forward."
  target_language: "German"
  expected_answer: |
    German preserving the corporate-jargon register. Should sound like German
    office-speak (with anglicisms like 'Deliverables' acceptable). Must NOT be
    technical engineering jargon or casual chat.

- text: "ご注文の品は、誠に勝手ながら本日中の発送が困難な状況でございます。"
  target_language: "English"
  expected_answer: |
    Polite formal customer-service English. Must convey: regret + that the
    order cannot be shipped today + apology. Acceptable: 'We sincerely
    apologise that we are unable to ship your order today'. Must NOT be a
    flat literal translation that loses the formal apologetic register.

- text: "C'est la fin des haricots."
  target_language: "English"
  expected_answer: |
    Idiomatic English meaning everything has gone wrong / it's all over.
    Acceptable: 'That's the last straw', 'It's all over now', 'We're done for'.
    Must NOT be the literal 'It's the end of the beans'.

- text: "The opera buffa's denouement hinges on the soprano's coloratura cadenza."
  target_language: "Italian"
  expected_answer: |
    Italian preserving the technical operatic terminology. Most of these
    terms (opera buffa, soprano, coloratura, cadenza) are already Italian and
    must be used as-is. Must use 'scioglimento' or 'epilogo' for denouement.

- text: "Long time no see! How've you been keeping?"
  target_language: "Spanish"
  expected_answer: |
    Casual warm Spanish greeting between friends after a gap. Idiomatic:
    '¡Cuánto tiempo!', '¿Cómo te ha ido?'. Must use tú-forms and preserve the
    warmth. Must NOT use formal usted.

- text: "If push comes to shove, we'll just have to wing it."
  target_language: "French"
  expected_answer: |
    Idiomatic French preserving 'if it comes to that' + 'we'll improvise'.
    Acceptable: 'Si on en arrive là, on improvisera' or similar. Must NOT
    translate 'wing it' literally about wings.

- text: "Please be informed that your visa application is hereby rejected pursuant to Section 214(b)."
  target_language: "Mandarin"
  expected_answer: |
    Formal Mandarin official-document register (公文体). Must use 通知-style
    phrasing and reference the specific legal section. Must NOT be casual or
    conversational.

- text: "Don't count your chickens before they hatch."
  target_language: "Russian"
  expected_answer: |
    Idiomatic Russian proverb with the same meaning. The standard equivalent
    is 'Цыплят по осени считают'. Must use this proverb (or a close variant).
    Must NOT be a word-for-word literal translation.

- text: "I'm just gonna grab a quick bite, then I'll head over."
  target_language: "Japanese"
  expected_answer: |
    Casual Japanese using plain-form (タメ口) verbs. Must convey 'eat something
    quickly' + 'then go over'. Must NOT use formal -ます forms.
