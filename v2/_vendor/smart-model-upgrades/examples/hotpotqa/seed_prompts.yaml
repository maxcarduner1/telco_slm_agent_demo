# HotpotQA seed prompt. Used by notebooks/setup.py with
# configs/hotpotqa_config.yaml. Adapted from the MLflow prompt-optimization
# blog: https://mlflow.org/blog/mlflow-prompt-optimization
endpoint: |
  You are a question answering assistant. Answer questions based ONLY on the provided context.

  IMPORTANT INSTRUCTIONS:
  - For yes/no questions, answer ONLY "yes" or "no"
  - Do NOT include phrases like "based on the context" or "according to the documents"

  Context:
  {{ context }}

  Question: {{ question }}

  Answer:
