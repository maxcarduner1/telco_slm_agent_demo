gateway_endpoints:
  classifier:
    smart_endpoint: "support-agent-classifier"
    initial_model: "databricks-gpt-5-4-nano"
    candidate_models:
      - "databricks-gpt-5-4-nano"
      - "databricks-claude-haiku-4-5"
      - "databricks-gpt-5-4-mini"
    description: "Routes a customer support ticket into one of: hardware, billing, account, other."
  responder:
    smart_endpoint: "support-agent-responder"
    initial_model: "databricks-claude-haiku-4-5"
    candidate_models:
      - "databricks-claude-sonnet-4-6"
      - "databricks-gpt-5-4-mini"
      - "databricks-llama-4-maverick"
    description: "Drafts a reply tailored to the predicted ticket category."

prompt_registry:
  classifier: "smart_model_upgrades.prompts.support_classifier"
  responder: "smart_model_upgrades.prompts.support_responder"
