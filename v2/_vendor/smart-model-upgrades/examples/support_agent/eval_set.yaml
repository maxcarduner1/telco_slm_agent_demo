- ticket: "My laptop won't power on after the latest firmware update. I tried holding the power button and unplugging it overnight. Nothing."
  expected_answer: "Categorized as hardware. Reply acknowledges the firmware-update context, offers concrete next steps (hard reset, remove battery if possible, boot to recovery mode, contact support if no progress). Should not promise replacement upfront."

- ticket: "I was charged twice for my November subscription -- once on Nov 2 and again on Nov 4. Please refund the duplicate."
  expected_answer: "Categorized as billing. Reply acknowledges duplicate charge, confirms refund will be processed (or that it's being investigated), gives expected timeframe, and asks for any additional info needed. Should NOT deny the charge or blame the customer."

- ticket: "I forgot my password and the reset email never arrives. I checked spam. My email is jane@example.com."
  expected_answer: "Categorized as account. Reply walks through reset flow, suggests checking other folders / allowlisting sender domain, and offers manual reset escalation path if still failing. Should NOT ask the customer to share their password."

- ticket: "Hi, just wanted to say your product is great. Keep it up!"
  expected_answer: "Categorized as other. Reply is a brief, warm thank-you. Should NOT try to sell anything, troubleshoot a problem, or escalate."

- ticket: "My screen has dead pixels in the bottom-left corner -- about 6-8 of them. The device is 3 weeks old."
  expected_answer: "Categorized as hardware. Reply acknowledges the issue, notes the device is within typical warranty window, explains next steps for inspection / replacement, and asks for photos if helpful. Should NOT dismiss as cosmetic."

- ticket: "I cancelled my subscription on October 15 but I just got billed again on November 1."
  expected_answer: "Categorized as billing. Reply acknowledges the cancellation, confirms a refund or investigation, and asks the customer for the cancellation confirmation if it can't be located. Should NOT claim the cancellation didn't happen without checking."

- ticket: "Can you change my account email from john@example.com to john@newdomain.com? I no longer have access to the old one."
  expected_answer: "Categorized as account. Reply explains the email-change flow, including verification of identity since the old email is inaccessible (e.g. via secondary factor). Should NOT just change the email without verification steps."

- ticket: "The keyboard backlight randomly turns off mid-typing. Happens about once an hour."
  expected_answer: "Categorized as hardware. Reply acknowledges the intermittent symptom, asks a couple of clarifying questions (is it tied to power state, did it start after an update, etc.), and offers troubleshooting + escalation path. Should NOT immediately offer replacement before triage."

- ticket: "Please cancel my account effective immediately and delete all my data."
  expected_answer: "Categorized as account. Reply confirms cancellation request, explains data-deletion process and any retention windows (regulatory / legal), and provides a confirmation. Should NOT push back-pressure ('are you sure?') beyond a single brief mention of pause-instead alternatives."

- ticket: "Why was my card declined when I tried to upgrade to the Pro plan? My card works elsewhere."
  expected_answer: "Categorized as billing. Reply asks for last 4 digits / approximate time so they can investigate, explains common causes (3DS challenge, address mismatch, anti-fraud flag), and offers an alternative payment method while it's resolved. Should NOT blame the customer's bank without checking."

- ticket: "I bought your standalone product last week and now I see it included in the new Premium bundle for the same price. Can I get the bundle features without paying extra?"
  expected_answer: "Categorized as billing. Reply acknowledges the bundling change, explains policy (typically: yes if within return window, otherwise prorated upgrade), and walks the customer through the path. Should NOT ignore the question or refuse without explanation."

- ticket: "How do I export my data? I want a backup before traveling."
  expected_answer: "Categorized as other. Reply walks through the export flow (settings menu -> export, or relevant API), notes file format and any size limits, and offers help if it's not visible. Should NOT redirect to general docs without concrete steps."

- ticket: "The trackpad has stopped clicking. Tap-to-click still works but physical click doesn't register."
  expected_answer: "Categorized as hardware. Reply acknowledges the symptom (likely mechanical), suggests basic checks (debris, recent drop, settings sanity), and offers inspection / repair path. Should NOT just tell the customer to enable tap-to-click as a permanent workaround."

- ticket: "I was told by sales that the Enterprise plan included SSO. Now I'm being asked to pay extra for an SSO add-on."
  expected_answer: "Categorized as billing. Reply takes the discrepancy seriously, asks for any sales correspondence to verify, and commits to making the customer whole if SSO was included in their quoted plan. Should NOT dismiss the customer's claim or insist the add-on fee always applies."

- ticket: "I have two-factor authentication on but I lost my phone and my backup codes."
  expected_answer: "Categorized as account. Reply explains the identity-verification recovery flow (which typically requires non-2FA proof of ownership), commits to a timeline, and asks the customer for the supporting info. Should NOT bypass 2FA without verification."

- ticket: "What's your SOC 2 attestation status? My security team needs it for procurement."
  expected_answer: "Categorized as other. Reply states the current attestation status (if known) or routes to the trust portal / a security contact, and offers to send the report under NDA. Should NOT promise certifications that don't exist."
