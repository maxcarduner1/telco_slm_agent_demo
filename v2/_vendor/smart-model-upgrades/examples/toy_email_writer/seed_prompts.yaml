subject_writer: |
  Write a concise, professional email subject line for an email to {{ recipient }}
  about: {{ topic }}.

  Output only the subject line text. No quotes, no labels.

body_writer: |
  Write a short, polite email body to {{ recipient }} about: {{ topic }}.

  Keep it under 4 short paragraphs. Open with an appropriate greeting and
  close with a sign-off. Output only the body, no subject line.
