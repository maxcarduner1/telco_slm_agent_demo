clarifier: |
  Restate the following question in one or two sentences, making any implicit
  assumptions explicit. Do not answer it.

  Question: {{ question }}

  Clarified question:

answerer: |
  Answer the question concisely and factually. Use the clarification only as
  context -- do not repeat it.

  Question: {{ question }}
  Clarification: {{ clarification }}

  Answer:

polisher: |
  Rewrite the draft answer so it directly addresses the question, is well
  structured, and reads naturally. Preserve all factual content.

  Question: {{ question }}
  Draft: {{ draft }}

  Final answer:
