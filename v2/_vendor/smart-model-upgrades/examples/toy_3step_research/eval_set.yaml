- question: "Why is the sky blue?"
  expected_answer: "Should explain Rayleigh scattering -- shorter (blue) wavelengths scatter more than longer ones in Earth's atmosphere."

- question: "What causes the seasons?"
  expected_answer: "Should explain the tilt of Earth's axis (about 23.5 degrees) relative to its orbital plane, not distance from the sun."

- question: "How does a refrigerator work?"
  expected_answer: "Should describe a refrigerant cycle: compression, condensation, expansion, evaporation -- moving heat from inside to outside."

- question: "Why do leaves change color in autumn?"
  expected_answer: "Should explain that chlorophyll breaks down, revealing other pigments (carotenoids, anthocyanins) already present or newly produced in leaves."

- question: "What is photosynthesis?"
  expected_answer: "The process by which plants convert sunlight, water, and CO2 into glucose and oxygen. Should mention chlorophyll."

- question: "How do vaccines work?"
  expected_answer: "Should explain that vaccines train the immune system by exposing it to a harmless form / piece of a pathogen, creating memory cells."

- question: "What is the greenhouse effect?"
  expected_answer: "Should describe how certain atmospheric gases (CO2, methane, water vapor) trap heat radiated from Earth's surface, warming the planet."

- question: "Why do we have leap years?"
  expected_answer: "Should explain that Earth's orbital period is about 365.24 days, so a leap day every four years (with adjustments) keeps the calendar aligned."

- question: "How does a vaccine differ from an antibiotic?"
  expected_answer: "Should explain that vaccines are preventative and train the immune system; antibiotics are treatments that kill or inhibit bacteria after infection."

- question: "What is DNA and what does it do?"
  expected_answer: "Should explain that DNA is a molecule (deoxyribonucleic acid) carrying genetic instructions that direct development and function of organisms."

- question: "Why does ice float on water?"
  expected_answer: "Should explain that water is unusual in expanding when it freezes -- the hydrogen-bonded crystal structure of ice is less dense than liquid water."

- question: "How does a microwave oven heat food?"
  expected_answer: "Should explain that microwaves cause polar molecules (mainly water) to rotate / vibrate, generating heat through molecular friction."

- question: "What is a black hole?"
  expected_answer: "A region of spacetime with gravity so strong that nothing -- not even light -- can escape past the event horizon. Often formed from collapsed massive stars."

- question: "Why does the Moon have phases?"
  expected_answer: "Should explain that we see different illuminated portions of the Moon as it orbits Earth, depending on the relative positions of Sun, Earth, Moon."

- question: "How does electricity flow through a circuit?"
  expected_answer: "Should describe electrons moving through a conductor driven by a voltage source, completing a closed loop from source to load and back."

- question: "What causes earthquakes?"
  expected_answer: "Should explain that tectonic plates move and accumulate stress at faults; sudden release of that stress sends seismic waves through the ground."

- question: "How do antibiotics kill bacteria?"
  expected_answer: "Should describe mechanisms like disrupting cell wall synthesis, inhibiting protein synthesis, or interfering with DNA replication, depending on the antibiotic class."

- question: "What is the difference between weather and climate?"
  expected_answer: "Weather is short-term atmospheric conditions; climate is the long-term average of weather patterns over decades or longer in a region."

- question: "Why does a compass point north?"
  expected_answer: "Should explain that a compass needle aligns with Earth's magnetic field; the 'magnetic north pole' is near, but not identical to, the geographic north pole."

- question: "How does a battery store energy?"
  expected_answer: "Should describe chemical energy stored via electrochemical reactions; current flows when electrons move from anode to cathode through an external circuit."

- question: "What is gravity?"
  expected_answer: "A fundamental attractive interaction between masses. Newton described it as a force; Einstein described it as the curvature of spacetime by mass-energy."

- question: "Why do we dream?"
  expected_answer: "Should mention that the cause is not fully understood; common theories include memory consolidation, emotional processing, or random neural activity interpreted by the brain."
