gateway_endpoints:
  clarifier:
    smart_endpoint: "toy-research-clarifier"
    initial_model: "databricks-gpt-5-4-nano"
    candidate_models:
      - "databricks-gpt-5-4-mini"
      - "databricks-claude-haiku-4-5"
    description: "Restates the user question to surface any ambiguity."
  answerer:
    smart_endpoint: "toy-research-answerer"
    initial_model: "databricks-gpt-5-4-nano"
    candidate_models:
      - "databricks-llama-4-maverick"
      - "databricks-gpt-5-4-mini"
    description: "Drafts a factual answer using the clarified question."
  polisher:
    smart_endpoint: "toy-research-polisher"
    initial_model: "databricks-gpt-5-4-nano"
    candidate_models:
      - "databricks-claude-sonnet-4-6"
      - "databricks-gpt-5-4-mini"
      - "databricks-llama-4-maverick"
    description: "Polishes the draft into a final, well-structured response."

prompt_registry:
  clarifier: "smart_model_upgrades.prompts.toy_research_clarifier"
  answerer: "smart_model_upgrades.prompts.toy_research_answerer"
  polisher: "smart_model_upgrades.prompts.toy_research_polisher"
