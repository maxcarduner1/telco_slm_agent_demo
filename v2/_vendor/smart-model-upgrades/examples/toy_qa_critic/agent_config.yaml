gateway_endpoints:
  answerer:
    smart_endpoint: "toy-qa-answerer"
    initial_model: "databricks-gpt-5-4-nano"
    candidate_models:
      - "databricks-gpt-5-4-mini"
      - "databricks-claude-haiku-4-5"
      - "databricks-llama-4-maverick"
    description: "Drafts a first-pass answer to a general-knowledge question."
  critic:
    smart_endpoint: "toy-qa-critic"
    initial_model: "databricks-gpt-5-4-nano"
    candidate_models:
      - "databricks-gpt-5-4-mini"
      - "databricks-gpt-5-4-nano"
      - "databricks-claude-haiku-4-5"
    description: "Reviews and revises the draft answer for accuracy and clarity."

prompt_registry:
  answerer: "smart_model_upgrades.prompts.toy_qa_answerer"
  critic: "smart_model_upgrades.prompts.toy_qa_critic"
