command: ["python", "scripts/start_app.py"]

resources:
  - name: lakebase-memory
    description: "Lakebase PostgreSQL for agent memory"
    database:
      database_resource_name: "telco-slm-agent-memory"

env:
  - name: CHAT_APP_PORT
    value: "3000"
  - name: API_PROXY
    value: "http://localhost:8000/invocations"
  - name: CHAT_PROXY_TIMEOUT_SECONDS
    value: "300"
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  - name: MLFLOW_EXPERIMENT_NAME
    value: "/Shared/telcogpt-v2-app-traces"
  - name: LAKEBASE_AUTOSCALING_PROJECT
    value: "telco-slm-agent-memory"
  - name: LAKEBASE_AUTOSCALING_BRANCH
    value: "production"
  - name: LAKEBASE_AGENT_MEMORY_SCHEMA
    value: "agent_memory_v2"
  - name: LLM_ENDPOINT
    value: "telcogpt-v2-supervisor"
  - name: SUPERVISOR_PROMPT_URI
    value: "prompts:/serverless_stable_jvj4qd_catalog.otel_rag_agent_demo.telcogpt_v2_supervisor@production"
  - name: EMBEDDING_ENDPOINT
    value: "otel-embedding2-300m"
  - name: VS_ENDPOINT
    value: "demo_telco_vs_endpoint"
  # V2 fallback values are set here so manual app restarts do not drop critical
  # env vars. Bundle config still overrides these for controlled deployments.
  - name: UC_CATALOG
    value: "serverless_stable_jvj4qd_catalog"
  - name: UC_SCHEMA
    value: "otel_rag_agent_demo"
  - name: DATABRICKS_WAREHOUSE_ID
    value: "cd0c3f2722a9cd81"
  - name: TASK_TIMEOUT_SECONDS
    value: "300"
